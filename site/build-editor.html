<title>Build editor — Analyzing Islam</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/highlights.css">
<!-- Quill v2 — rich-text editor. RTL-safe (Arabic, Hebrew), full toolbar. -->

</head>
<body>

<nav class="site-nav">
  <div class="site-nav-inner">
    <a href="index.html" class="site-brand">Analyzing Islam</a>
    <div class="site-nav-links">
      <a href="index.html">Home</a>

<main class="build-editor-main">
  <!-- Sign-in gate; replaced with the editor once auth is ready. -->
  <div id="build-editor-shell">
    <div class="auth-message auth-message--info" style="max-width:640px; margin: 60px auto;">Loading…</div>
  </div>
</main>

<!-- Save / Share modal overlay -->
<div id="build-modal-overlay" class="build-modal-overlay" hidden>
  <div class="build-modal" role="dialog" aria-modal="true" aria-labelledby="build-modal-title">
    <h3 id="build-modal-title">Save build</h3>
    <div class="build-modal-body"></div>
    <div class="build-modal-actions">
      <button type="button" class="btn" data-modal-cancel>Cancel</button>
      <button type="button" class="btn btn-primary" data-modal-confirm>Save</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js" defer></script>
<script src="assets/js/auth-ui.js" defer></script>
<script src="assets/js/builds.js" defer></script>
<script src="assets/js/splitter.js" defer></script>
<script src="assets/js/verse-parser.js" defer></script>
<script src="assets/js/goat-skins.js"></script>
<script src="assets/js/goat.js" defer></script>
<!-- Quill itself -->
