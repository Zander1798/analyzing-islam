<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Set a new Analyzing Islam password.">
<!-- Favicon + app-icon set (browser tab, iOS home-screen, Android manifest) -->

<link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16.png">
<link rel="icon" href="/assets/icons/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
<link rel="manifest" href="/assets/icons/site.webmanifest">
<meta name="theme-color" content="#0a0a0a">
<title>Reset password — Analyzing Islam</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="site-nav">
  <div class="site-nav-inner">
    <a href="index.html" class="site-brand">Analyzing Islam</a>
    <div class="site-nav-links">
      <a href="index.html">Home</a>

      <a href="faq.html">FAQ</a>
    </div>
  </div>
</nav>

<div class="auth-shell">
  <h1>Set a new password</h1>
  <p class="auth-lede">You arrived here from a reset email. Choose a new password and sign in again.</p>

  <form id="reset-form" class="auth-form" autocomplete="on">
    <div id="reset-message" class="auth-message auth-message--info" style="display:none;"></div>

    <div class="auth-field">
      <label for="reset-password">New password</label>
      <input id="reset-password" name="password" type="password" autocomplete="new-password" required minlength="8" placeholder="Minimum 8 characters">
    </div>

    <div class="auth-field">
      <label for="reset-confirm">Confirm new password</label>
      <input id="reset-confirm" name="confirm" type="password" autocomplete="new-password" required minlength="8">
    </div>

    <button id="reset-submit" type="submit" class="auth-submit">Update password</button>
  </form>
</div>

<footer class="site-footer">
  Built from the Saheeh International translation. Every entry references a specific verse — verify before citing.
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js" defer></script>
<script src="assets/js/auth-ui.js" defer></script>
<script src="assets/js/goat.js" defer></script>
<script>
  (function () {
    const form = document.getElementById("reset-form");
    const password = document.getElementById("reset-password");
    const confirm = document.getElementById("reset-confirm");
    const submit = document.getElementById("reset-submit");
    const msg = document.getElementById("reset-message");

    function showMessage(kind, text) {
      msg.className = "auth-message auth-message--" + kind;
      msg.textContent = text;
      msg.style.display = "block";
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      msg.style.display = "none";

      if (password.value !== confirm.value) {
        showMessage("error", "Passwords don't match.");
        return;
      }

      if (!window.AI_AUTH) {
        showMessage("error", "Auth system is loading. Try again in a second.");
        return;
      }

      submit.disabled = true;
      submit.textContent = "Updating…";

      const { error } = await window.AI_AUTH.updatePassword(password.value);

      if (error) {
        submit.disabled = false;
        submit.textContent = "Update password";
        if (error.message && /auth session missing/i.test(error.message)) {
          showMessage("error", "This reset link has expired or is invalid. Request a new one from the forgot-password page.");
        } else {
          showMessage("error", error.message || "Couldn't update password.");
        }
        return;
      }

      form.style.display = "none";
      showMessage("success", "Password updated. You can now sign in with your new password.");
      setTimeout(function () { location.href = "login.html"; }, 2000);
    });
  })();
</script>
</body>
</html>
