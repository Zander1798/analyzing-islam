<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Reset your Analyzing Islam password.">

<link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16.png">
<link rel="icon" href="/assets/icons/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
<link rel="manifest" href="/assets/icons/site.webmanifest">
<meta name="theme-color" content="#0a0a0a">
<title>Forgot password — Analyzing Islam</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="site-nav">
  <div class="site-nav-inner">
    <a href="index.html" class="site-brand">Analyzing Islam</a>
    <div class="site-nav-links">
      <a href="index.html">Home</a>

    </div>
  </div>
</nav>

<div class="auth-shell">
  <h1>Forgot password</h1>
  <p class="auth-lede">Enter your email and we'll send you a reset link.</p>

  <form id="forgot-form" class="auth-form" autocomplete="on">
    <div id="forgot-message" class="auth-message auth-message--info" style="display:none;"></div>

    <div class="auth-field">
      <label for="forgot-email">Email</label>
      <input id="forgot-email" name="email" type="email" autocomplete="email" required>
    </div>

    <button id="forgot-submit" type="submit" class="auth-submit">Send reset link</button>

    <div class="auth-links">
      <a href="login.html">← Back to sign in</a>
    </div>
  </form>
</div>

<footer class="site-footer">
  Built from the Saheeh International translation. Every entry references a specific verse — verify before citing.
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js" defer></script>
<script src="assets/js/auth-ui.js" defer></script>
<script src="assets/js/goat.js" defer></script>
<script>
  (function () {
    const form = document.getElementById("forgot-form");
    const email = document.getElementById("forgot-email");
    const submit = document.getElementById("forgot-submit");
    const msg = document.getElementById("forgot-message");

    function showMessage(kind, text) {
      msg.className = "auth-message auth-message--" + kind;
      msg.textContent = text;
      msg.style.display = "block";
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      msg.style.display = "none";

      if (!window.AI_AUTH) {
        showMessage("error", "Auth system is loading. Try again in a second.");
        return;
      }

      submit.disabled = true;
      submit.textContent = "Sending…";

      const { error } = await window.AI_AUTH.resetPassword(email.value.trim());

      if (error) {
        submit.disabled = false;
        submit.textContent = "Send reset link";
        showMessage("error", error.message || "Couldn't send reset link. Try again.");
        return;
      }

      form.style.display = "none";
      showMessage(
        "success",
        "If an account exists for " + email.value.trim() + ", a reset link is on its way. Check your inbox (and spam)."
      );
    });
  })();
</script>
<script src="assets/js/snap-to-hash.js" defer></script>
</body>
</html>
