<div class="auth-shell">
  <h1>Your account</h1>
  <p class="auth-lede">Manage the basics. Saved entries and notes are on the <a href="saved.html">My saved entries</a> page.</p>

  <div id="profile-shell"></div>
</div>

<footer class="site-footer">
  Built from the Saheeh International translation. Every entry references a specific verse — verify before citing.
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js" defer></script>
<script src="assets/js/auth-ui.js" defer></script>
<script src="assets/js/bookmarks.js" defer></script>
<script src="assets/js/goat-skins.js"></script>
<script src="assets/js/goat.js" defer></script>
<script>
  (function () {
    const shell = document.getElementById("profile-shell");

    function escapeHtml(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }

    function renderNotSignedIn() {
      shell.innerHTML =
        '<div class="auth-message auth-message--info">' +
        'You\'re not signed in. ' +
        '<a href="login.html">Sign in</a> or <a href="signup.html">create an account</a> to use saved entries and notes.' +
        '</div>';
    }

    function avatarHtml(profile, user) {
      if (profile && profile.avatar_url) {
        return '<img class="profile-avatar-img" src="' + escapeHtml(profile.avatar_url) + '" alt="Your avatar">';
      }
      const letter = (profile && profile.username && profile.username[0]) ||
                     ((user && user.email && user.email[0]) || "?");
      return '<span class="profile-avatar-initial">' + escapeHtml(letter.toUpperCase()) + '</span>';
    }

    function renderSignedIn(user, profile) {
      const username = (profile && profile.username) || "";
      const usernameLabel = username ? "@" + username : "(no username yet)";

      shell.innerHTML =
        '<div class="profile-header">' +
        '  <div class="profile-avatar">' + avatarHtml(profile, user) + '</div>' +
        '  <div class="profile-header-text">' +
        '    <div class="profile-header-name">' + escapeHtml(usernameLabel) + '</div>' +
        '    <div class="profile-header-email">' + escapeHtml(user.email) + '</div>' +
        '    <div class="profile-header-meta">Account created ' + new Date(user.created_at).toLocaleDateString() + '</div>' +
        '  </div>' +
        '</div>' +

        // ---------- Avatar upload ----------
        '<section class="profile-section">' +
        '  <h2>Profile picture</h2>' +
        '  <p class="profile-section-lede">Shown in the nav bar and on your shared builds. PNG, JPG, WebP or GIF, up to 5 MB.</p>' +
        '  <div id="avatar-message" class="auth-message auth-message--info" style="display:none;"></div>' +
        '  <div class="profile-avatar-row">' +
        '    <div class="profile-avatar profile-avatar--sm" id="avatar-preview">' + avatarHtml(profile, user) + '</div>' +
        '    <div class="profile-avatar-actions">' +
        '      <label for="avatar-file" class="btn">Choose image…</label>' +
        '      <input id="avatar-file" type="file" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none;">' +
        (profile && profile.avatar_url
          ? '      <button type="button" id="avatar-remove" class="btn btn-ghost">Remove</button>'
          : '') +
        '    </div>' +
        '  </div>' +
        '</section>' +

        // ---------- Username ----------
        '<section class="profile-section">' +
        '  <h2>Username</h2>' +
        '  <p class="profile-section-lede">Public. 3–20 characters, lowercase letters, digits, and underscore only. Can\'t start with an underscore.</p>' +
        '  <form id="username-form" class="auth-form" autocomplete="off">' +
        '    <div id="username-message" class="auth-message auth-message--info" style="display:none;"></div>' +
        '    <div class="auth-field">' +
        '      <label for="username-input">Username</label>' +
        '      <input id="username-input" type="text" value="' + escapeHtml(username) + '"' +
        '             minlength="3" maxlength="20" pattern="[a-z0-9][a-z0-9_]{2,19}"' +
        '             spellcheck="false" autocomplete="off">' +
        '      <div id="username-hint" class="auth-hint">' + (username ? 'Change your username.' : 'Set your username.') + '</div>' +
        '    </div>' +
        '    <button id="username-submit" type="submit" class="auth-submit">Save username</button>' +
        '  </form>' +
        '</section>' +

        // ---------- Share links ----------
        '<section class="profile-section">' +
        '  <h2>Active share links</h2>' +
        '  <p class="profile-section-lede">Each share link is a public URL that shows one of your saved entries plus your notes at the moment you created the link. Revoke to stop the link working.</p>' +
        '  <div id="shares-list">Loading…</div>' +
        '</section>' +

        // ---------- Password ----------
        '<section class="profile-section">' +
        '  <h2>Change password</h2>' +
        '  <form id="change-password" class="auth-form" autocomplete="on">' +
        '    <div id="cp-message" class="auth-message auth-message--info" style="display:none;"></div>' +
        '    <div class="auth-field">' +
        '      <label for="cp-new">New password</label>' +
        '      <input id="cp-new" type="password" autocomplete="new-password" required minlength="8">' +
        '    </div>' +
        '    <div class="auth-field">' +
        '      <label for="cp-confirm">Confirm new password</label>' +
        '      <input id="cp-confirm" type="password" autocomplete="new-password" required minlength="8">' +
        '    </div>' +
        '    <button id="cp-submit" type="submit" class="auth-submit">Update password</button>' +
        '  </form>' +
        '</section>' +

        // ---------- Deactivate ----------
        '<section class="profile-section profile-section--danger">' +
        '  <h2>Deactivate account</h2>' +
        '  <p class="profile-section-lede">Permanently delete your account, saved entries, notes, builds, and share links. This cannot be undone.</p>' +
        '  <form id="deactivate-form" autocomplete="off">' +
        '    <div id="deact-message" class="auth-message auth-message--info" style="display:none;"></div>' +
        '    <div class="auth-field">' +
        '      <label for="deact-confirm">Type <code>DELETE</code> to confirm</label>' +
        '      <input id="deact-confirm" type="text" autocomplete="off" spellcheck="false">' +
        '    </div>' +
        '    <button id="deact-submit" type="submit" class="auth-submit auth-submit--danger" disabled>Permanently delete my account</button>' +
        '  </form>' +
        '</section>';

      wireAvatar(profile, user);
      wireUsername(profile);
      renderShares();
      wirePassword();
      wireDeactivate();
    }

    // ---------- Avatar ----------
    function wireAvatar(profile, user) {
      const file = document.getElementById("avatar-file");
      const preview = document.getElementById("avatar-preview");
      const msg = document.getElementById("avatar-message");
      const remove = document.getElementById("avatar-remove");

      function setMsg(kind, text) {
        msg.className = "auth-message auth-message--" + kind;
        msg.textContent = text;
        msg.style.display = "block";
      }

      file.addEventListener("change", async function () {
        if (!file.files || !file.files[0]) return;
        const f = file.files[0];

        // Optimistic preview.
        const reader = new FileReader();
        reader.onload = function () {
          preview.innerHTML = '<img class="profile-avatar-img" src="' + reader.result + '" alt="Avatar preview">';
        };
        reader.readAsDataURL(f);

        setMsg("info", "Uploading…");
        const { error, url } = await window.AI_AUTH.uploadAvatar(f);
        if (error) {
          setMsg("error", error.message || "Upload failed.");
          return;
        }
        setMsg("success", "Avatar updated.");
        preview.innerHTML = '<img class="profile-avatar-img" src="' + url + '" alt="Your avatar">';
        file.value = "";
      });

      if (remove) {
        remove.addEventListener("click", async function () {
          if (!confirm("Remove your avatar?")) return;
          setMsg("info", "Removing…");
          const { error } = await window.AI_AUTH.updateProfile({ avatar_url: null });
          if (error) {
            setMsg("error", error.message || "Could not remove avatar.");
            return;
          }
          setMsg("success", "Avatar removed.");
          const letter = ((window.__profile && window.__profile.username && window.__profile.username[0]) ||
                          (user.email && user.email[0]) || "?").toUpperCase();
          preview.innerHTML = '<span class="profile-avatar-initial">' + escapeHtml(letter) + '</span>';
          remove.remove();
        });
      }
    }

    // ---------- Username ----------
    function wireUsername(profile) {
      const form = document.getElementById("username-form");
      const input = document.getElementById("username-input");
      const hint = document.getElementById("username-hint");
      const submit = document.getElementById("username-submit");
      const msg = document.getElementById("username-message");
      const USERNAME_RE = /^[a-z0-9][a-z0-9_]{2,19}$/;

      function setHint(state, text) {
        hint.textContent = text;
        hint.className = "auth-hint auth-hint--" + state;
      }

      function setMsg(kind, text) {
        msg.className = "auth-message auth-message--" + kind;
        msg.textContent = text;
        msg.style.display = "block";
      }

      input.addEventListener("input", function () {
        const lower = input.value.toLowerCase();
        if (lower !== input.value) input.value = lower;
      });

      let token = 0;
      input.addEventListener("input", function () {
        const u = input.value.trim();
        const mine = ++token;
        if (!u) {
          setHint("info", "Pick a username.");
          return;
        }
        if (!USERNAME_RE.test(u)) {
          setHint("error", "3–20 chars, lowercase letters/digits/underscore, can't start with _.");
          return;
        }
        if (profile && profile.username && u === profile.username) {
          setHint("info", "This is your current username.");
          return;
        }
        setHint("info", "Checking availability…");
        setTimeout(async function () {
          if (mine !== token) return;
          const { available, reason } = await window.AI_AUTH.checkUsernameAvailable(u);
          if (mine !== token) return;
          if (available) setHint("success", "“" + u + "” is available.");
          else if (reason === "taken") setHint("error", "“" + u + "” is already taken.");
          else setHint("error", "Could not check availability.");
        }, 400);
      });

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        msg.style.display = "none";
        const u = input.value.trim().toLowerCase();
        if (!USERNAME_RE.test(u)) {
          setMsg("error", "Invalid format.");
          return;
        }
        submit.disabled = true;
        submit.textContent = "Saving…";
        const { error } = await window.AI_AUTH.updateProfile({ username: u });
        submit.disabled = false;
        submit.textContent = "Save username";
        if (error) {
          if (error.code === "23505" || /duplicate/i.test(error.message || "")) {
            setMsg("error", "“" + u + "” is already taken.");
          } else if (error.code === "23514" || /profiles_username_format/.test(error.message || "")) {
            setMsg("error", "Invalid username format.");
          } else {
            setMsg("error", error.message || "Could not save.");
          }
          return;
        }
        setMsg("success", "Saved. You are now @" + u + ".");
      });
    }

    // ---------- Shares ----------
    async function renderShares() {
      const list = document.getElementById("shares-list");
      if (!list || !window.AI_BOOKMARKS) return;
      list.textContent = "Loading…";
      const shares = await window.AI_BOOKMARKS.listShares();
      if (!shares.length) {
        list.innerHTML = '<p style="color:var(--text-dim); font-size:14px;">No active share links. Create one from any saved entry\'s detail page.</p>';
        return;
      }
      list.innerHTML = shares.map(function (s) {
        const sharedUrl = new URL("shared.html", location.href);
        sharedUrl.searchParams.set("id", s.id);
        return '<div class="profile-share-row">' +
          '<div class="profile-share-title">' +
          '<a href="entry.html?id=' + encodeURIComponent(s.entry_id) + '">' + escapeHtml(s.entry_title || "(Untitled)") + "</a></div>" +
          '<div class="profile-share-meta">' +
          (s.entry_ref ? escapeHtml(s.entry_ref) + " · " : "") +
          "Created " + new Date(s.created_at).toLocaleDateString() + "</div>" +
          '<div class="profile-share-controls">' +
          '  <input type="text" value="' + escapeHtml(sharedUrl.toString()) + '" readonly>' +
          '  <button type="button" class="btn" data-action="copy" data-url="' + escapeHtml(sharedUrl.toString()) + '">Copy</button>' +
          '  <button type="button" class="btn btn-danger" data-action="revoke" data-id="' + escapeHtml(s.id) + '">Revoke</button>' +
          "</div></div>";
      }).join("");

      list.querySelectorAll('[data-action="copy"]').forEach(function (btn) {
        btn.addEventListener("click", async function () {
          try {
            await navigator.clipboard.writeText(btn.getAttribute("data-url"));
            btn.textContent = "Copied ✓";
            setTimeout(function () { btn.textContent = "Copy"; }, 1500);
          } catch (e) {
            console.error(e);
          }
        });
      });
      list.querySelectorAll('[data-action="revoke"]').forEach(function (btn) {
        btn.addEventListener("click", async function () {
          if (!confirm("Revoke this share link? The URL will stop working immediately.")) return;
          btn.disabled = true;
          btn.textContent = "Revoking…";
          await window.AI_BOOKMARKS.revokeShare(btn.getAttribute("data-id"));
          renderShares();
        });
      });
    }

    // ---------- Password ----------
    function wirePassword() {
      const form = document.getElementById("change-password");
      const newIn = document.getElementById("cp-new");
      const confirmIn = document.getElementById("cp-confirm");
      const submit = document.getElementById("cp-submit");
      const msg = document.getElementById("cp-message");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        msg.style.display = "none";
        if (newIn.value !== confirmIn.value) {
          msg.className = "auth-message auth-message--error";
          msg.textContent = "Passwords don't match.";
          msg.style.display = "block";
          return;
        }
        submit.disabled = true;
        submit.textContent = "Updating…";
        const { error } = await window.AI_AUTH.updatePassword(newIn.value);
        submit.disabled = false;
        submit.textContent = "Update password";
        if (error) {
          msg.className = "auth-message auth-message--error";
          msg.textContent = error.message || "Update failed.";
          msg.style.display = "block";
          return;
        }
        msg.className = "auth-message auth-message--success";
        msg.textContent = "Password updated.";
        msg.style.display = "block";
        newIn.value = "";
        confirmIn.value = "";
      });
    }

    // ---------- Deactivate ----------
    function wireDeactivate() {
      const form = document.getElementById("deactivate-form");
      const confirmIn = document.getElementById("deact-confirm");
      const submit = document.getElementById("deact-submit");
      const msg = document.getElementById("deact-message");

      confirmIn.addEventListener("input", function () {
        submit.disabled = confirmIn.value !== "DELETE";
      });

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        msg.style.display = "none";
        if (confirmIn.value !== "DELETE") return;
        if (!confirm("This will permanently delete your account, saved entries, notes, builds and share links. This cannot be undone. Continue?")) return;

        submit.disabled = true;
        submit.textContent = "Deleting…";
        const { error } = await window.AI_AUTH.deleteAccount();
        if (error) {
          submit.disabled = false;
          submit.textContent = "Permanently delete my account";
          msg.className = "auth-message auth-message--error";
          msg.textContent = error.message || "Could not delete account.";
          msg.style.display = "block";
          return;
        }
        location.href = "index.html";
      });
    }

    function paint() {
      const sess = window.__session;
      if (sess && sess.user) {
        renderSignedIn(sess.user, window.__profile);
      } else {
        renderNotSignedIn();
      }
    }

    if (window.__authReady) {
      window.__authReady.then(paint);
    } else {
      paint();
    }
    window.addEventListener("auth-state", paint);
    window.addEventListener("profile-state", paint);
  })();
</script>
<script src="assets/js/snap-to-hash.js" defer></script>
</body>
